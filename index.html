<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cazando 🐾</title>
  <link rel="stylesheet" href="cazando.css">
</head>

<body onload="iniciarJuego();">
  <div class="game-wrapper">

    <header class="game-header">
      <h1>🐾 Cazando 🐾</h1>
      <p class="author">Por: Alexandra Ramírez</p>
    </header>

    <div class="main-layout">

      <section class="game-section">
        <canvas id="areaJuego" width="450" height="450"></canvas>
        <p id="mensaje"></p>
      </section>

      <aside class="sidebar">

        <div class="card stats">
          <p>⭐ Puntos</p>
          <span id="puntaje">0</span>
        </div>

        <div class="card stats">
          <p>⏳ Tiempo</p>
          <span id="tiempo">15</span>
        </div>

        <div class="card objetivo">
          🎯 Atrapa la comida
        </div>

        <div class="card controles">
          <button class="arriba" onclick="moverArriba()">▲</button>
          <button class="izquierda" onclick="moverIzquierda()">◀</button>
          <button class="derecha" onclick="moverDerecha()">▶</button>
          <button class="abajo" onclick="moverAbajo()">▼</button>
        </div>

        <button class="btn-restart" onclick="reiniciarJuego()">↺ Reiniciar</button>

      </aside>

    </div>

  </div>
  <script src="cazando.js"></script>
  <script src="utils.js"></script>


</body>
</html>
